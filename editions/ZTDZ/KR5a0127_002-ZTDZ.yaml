front:
  text: 黄帝陰符經夾頌解注卷中
  hash: sha256:c4a2528f8522ae8a0f57f2be525de4f83a0969c2e1c23a5aee793d50da7a08f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0127_SJB_002-020838c, image: sjb/02/020838c.png}
body:
  text: 南昌脩江混然子王道淵注天生天殺道之理也以世法言天生陽也天殺陰也一陰一陽之謂道一生一殺之謂理天生於春萬物發生於陽天之仁也天殺於秋萬物收斂於陰天之義也陰陽消長道之理也是以聖人觀天之道執理於心以無爲而化天下之民聖人之仁也以五刑而齊天下之法聖人之義也仁義體用聖人之道也以道用言凡遇身中冬至之時則當閉關靜定飛意化火鍊精爲氣督進陽火從太玄宫提上南宫此天生之理也至此已往陽極而虧故一陰生于五陽之下則當斂陽而退陰符從玉山上京下重樓送至坤位而止發武火煅煉烹陰爲陽此天殺之理也運用一身綿綿若存豈不是道之理也邵子曰乾遇巽時觀月窟地逢雷處躡天根天根月窟閑來往三十六宫都是春如斯之謂也頌曰陽龍陰虎兩盤旋生殺天機理自然鍊出一丸眞種子壼中春滿道綿綿天地萬物之盜萬物人之盜人萬物之盜天地萬物之盜者此謂天地生萬物萬物之性命莫不由乎陰陽運化結成其形舉心動念處天地皆知作其善者鬼神護佑作其惡者雷霆典刑此天地所以盜萬物也萬物人之盜者此言萬物之生與人並作人身之内生八萬四千蟲今略言之内則五臟被蟯蛔所食外則皮膚被蚤蝨所攻譚景昇化書所謂𧕍虰者腹中之蟲也摶我精氣鑠我魂魄盜我滋味而有其生此萬物所以盜人也人萬物之盜者此言人爲萬物至靈一心包含萬物之理師天地而知運化師蜘咮而結網罟師蜜蜂而立君臣師拱鼠而製禮師鳴鳳而作樂師螻蟻而設兵陣聖人能取萬物之理以致一身此人所以盗萬物也總而言之天地人物之生皆在大化之中形形相盜物物相欺無非陰陽五行之氣使之而然也唯有道者了明三盗超出陰陽之外則無三尸所盜之害也學者宜玩味焉頌曰天地人同萬物生一家一竅各含靈形形相盜陰陽化悟者超凡入太清三盜既宜三才既安此承上云三盗之義於此故云三盜既宜者此所謂有道之人一性覺照萬理貫通自能勘破一身四大是陰陽五行之氣假合而生我則不被形縛但密行符火以鍊形神神凝氣結是謂金丹大藥自能殺滅三尸之蟲既得三盜絶滅自然三才安矣邵子所謂既知萬物備於我肯把三才别立根張紫陽故曰追二氣於黄道會三性於元宫神全不思睡氣全不思食精全不思慾工夫至此何患乎三才不安矣頌曰三盜三才備一身心君轉物各歸根乾坤定位邪魔伏萬國清平荷聖恩故曰食其時百骸理動其機萬化安此又承上云三才既安之義於此故曰食其時百骸理者此言學人平日大要調和五臟飲食不可失其時苟無失其時則通身三百六十骨節血氣周流無處不暢而病患自不生既得其身體康泰可以棲神抱氣常住中田依時取牽池玉液之漿澆灌靈根其苗自秀老子故曰天下有道却走馬以糞我獨異於人而貴食母是也動其機萬化安者此言遇一陽初動之時便當轉斗柄之機以復之行道一次則通身萬神暢快純陽眞人金丹詩曰獨處乾坤大象中從頭歷歷運元功縱横北斗心機巧顛倒南辰膽氣雄鬼哭神哀金鼎裂雞飛犬化玉爐空云何俗子尋常覓大道希夷妙莫窮丹經曰子細思量是妙哉朝朝自勸紫霞杯若將地魄精擒縛自有天魂祝壽來此之謂也頌曰修眞飲食要調停一氣冲和五臟清金液鍊形神火煅通身毫孔放光明人知其神之神不知不神之所以神神之爲言靈也性也人之靈性虚明無象在父母未生已前不有其始居父母已生之後不有其終至靈至聖至幽至微包含衆體總廓萬靈不生不滅不方不圓白紫清眞人故曰此神不是思慮神乃與元始相比肩是也此一節言學人平日修養工夫先以明性爲主心地之中常宜清靜不可容一毫私欲罣礙於心亦不可着相求玄若纔舉箇意思神便不是神了經曰夫人神好清而心擾之此神全體之妙在乎心空無物淵默含眞與太虚同其體與日月同其明凡應事接物之間以性隨機轉應自然三界圓通此所以不知不神之所以神也張眞人曰視之不可見其形及至呼之又却譍金剛經云世人以色相求我以音聲求我是人行邪道不得見如來斯言盡矣頌曰一點元靈是至神神知神處便非眞人能了悟神虚體朗朗眞空不掛雲日月有數小大有定聖功生焉神明出焉此承上云明性之體於此故發明修命之用既得性住必復命關若能性命雙修方得形神俱妙夫修命之訣學人可以觀天之道日月運行而有冬夏二至陰陽停半而有卯酉二分積日成月積月成歲是以日月有數而小大有定豈不聞日屬陽月屬陰月本無光借日之光每月晦朔太陰與太陽同宫交會月至此時黑而無光月自初二初三離日漸遠日射光於月生明而小魂漸長魄漸消至初八日夜光平上一半乃曰上弦自此已往至十五日夜月與日相望光明圓滿而大至此魂極而魄生十六七日以下魄長魂消月光漸减至二十三日夜光平下一半乃曰下弦自此退至三十日夜月光盡而又還晦矣周而復始循環無窮此天道運化自然而然是以大修行人體此之理運周天火候於一身所言日月者精神也水火也鉛汞也性情也當作丹之時以神合氣主固於内飛神出在寅方至申時進火如日射光於月漸漸生明而壯流精化氣直入泥丸如月與日對望繼此陰生用青女傳言退符下入坤宫日月合璧結成還丹丹始結而小功深漸養而大故謂日月有數小大有定也勤採勤收時烹刻鍊眞胎鬱秀智慧開通故曰聖功生焉神明出焉頌曰日月週天數往來功施梵氣結靈胎從微至著神超聖火裏栽蓮朵朵開其盜機也天下莫能見莫能知君子得之固躬小人得之輕命此承上云運行日月於一身故得聖功生而神明出於此故云其盗機也者此箇盜字非世人竊盜之盜乃運周天符火之法一息工夫能奪天地一年造化丹經云五行順行虎向水中生五行顛倒龍從火裏出行此道者天地不能拘甲子管不得是以大修行人乃天地外一賊爾張紫陽所謂工夫容易藥非遥豈非其盜機也哉這箇盜機至簡至易是謂無狀之狀無象之象是以天下莫能見莫能知也君子之人得之謙恭退隱抱朴存眞絶聰棄智惟德爲身損之又損混俗同塵來者即應無喜無嗔未嘗顯己之有道此所以得之固躬也老子曰我有三寶保而持之一曰慈二曰儉三曰不敢爲天下先又曰上德不德是以有德是也小人之人若得此道便要逞弄不能伏藏自是自大自顯自長自伐自矜欺人侮法全無忌憚薄德薄行人皆忌之如是之人未有不陷於害而輕於命如龐涓之流是也經曰自見者不明自是者不彰自伐者無功自矜者不長强梁者不得其死孔子故曰小人反中庸小人無忌憚也豈虚言哉學人宜於此詳察頌曰燒山符子盗天機大象希形道隱微君子得之身退守小人一得便胡爲黄帝陰符經夾頌解注卷中
