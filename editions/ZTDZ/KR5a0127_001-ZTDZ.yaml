front:
  text: 黄帝陰符經夾頌解註卷上中下同卷
  hash: sha256:c39d6bc327646d513774a3dc9b6303023f341399f6f8ec4e95bcdcf9bb41d11c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0127_SJB_001-020834b, image: sjb/02/020834b.png}
body:
  text: 南昌脩江混然子王道淵註夫陰符者一陰一陽之謂也太極未判之始溟溟涬涬遼廓無光純一陰炁而已陰因之極一陽生於中便分奇偶陽動陰靜兩儀判焉人生其中三才立焉三才既立萬物生焉生萬物者道也成至道者人也聖人所以建天地施德化修性命定人物此陰符所以作也以世法言萬物皆有形曰陰萬物皆有性命曰符萬物皆有自然之道曰經以道用言人之四大一身皆屬陰唯一點祖炁居天心屬陽是曰命蒂性與命合曰符符者契合也分開兩箇勘合渾淪陰符二字身心也性情也水火也神氣也鉛汞也龍虎也動靜也乃爲修丹之根本養道之淵宗凡作丹妙用每遇日中冬至之時則當閉關外則運陽火於東南而復退陰符於西北存北方不行正萬物藏形之時也於此時含光内燭眞氣薰蒸片餉之間混融磅礴陰氣消化陽氣日新此立成丹基之胎乆乆純熟自然精氣輕清如熱雲旋轉華池津液脉絡之來澆灌靈根結成還丹是謂陰符之道也經之爲言徑也人人共行之徑路也丹經云處處緑楊堪繫馬家家有路到長安頌曰太極未分渾是陰一陽動處見天心陽舒陰慘相符合大道生生德化深觀天之道執天之行盡矣觀者仰觀於天也仰見其天道日月運行風雲變化鼓之以雷霆潤之以雨澤一暑一寒一來一往此天道運化以行鬼神所以生物之大功也至如在天星象北辰居其天中寂然不動而衆星拱之隨斗標晝夜旋轉週天此天向一中分造化也北斗屬水水得六數何以有七星南斗屬火火得七數何以有六星此水火互交自然之道也是以聖人見天道如此返求於身觀之我身即天地故執天以行之也人之一呼一吸即乾坤闔闢也水上昇火下降即月運行也皷吾身之槖籥即風雲變化也吸神觀心鍊精化氣逆上泥丸即皷之以雷霆也浩氣冲虚神水流注即潤之以雨澤也進陽火退陰符即一暑一寒一來一往也此執大化運行於身無不與天道同也密户之左生門之右中虚一竅空玄不動萬神朝會之宗即北辰居其所而衆星拱之也天一生水從地而升地二生火從天而降水中藏火火中藏水即北斗屬水而七星南斗屬火而六星丹家所謂龍從火裏出虎向水中生是也學人能知此數說不可着在文字上猜度要明未畫已前造化此箇微意當求眞師口訣而後可知夫修丹之道一要明鼎器端的二要攢簇藥物眞全三要運符火烹鍊得法戒定性智絶利清源行住坐卧綿綿若存如此勤而修之未有不成道者也老子曰谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤丹經云一馬自隨天變化六龍長駕日循還張紫陽云先把乾坤爲鼎器次搏烏免藥來烹邵子故曰天人焉有兩般義道不虚行只在人豈不是觀天之道執天之行盡矣哉頌曰觀天之道運無窮故執樞機合聖功顛倒這眥消息子乾坤都入黍珠中天有五賊見之者昌五賊在心施行于天五賊者乃五行之氣也在天地爲水火木金土在人爲心肝脾肺腎又爲精神魂魄意又爲眼耳鼻舌身人之一點元靈父母未生已前甚是分明始因父母生我之形此靈入竅被形所梏人爲赤子之時性無不善蓋因年漸長成習染各異眼耳鼻舌被色聲香味所觸而心貪愛意馬馳騁于是流浪苦海愛河迷亂眞性耗其靈根失其至寶此所以被五賊所害世人不得眞道者爲此也尹眞人曰天物怒流人事錯錯然正謂此也學人若能勘破浮華幻相皆非我有唯一靈眞性是我本來面目從今去不被幻軀所役把已往貪愛之心盡底掀翻但虚其心實其腹弱其志强其骨動靜之間以性爲主人以五賊爲家臣君無爲而正信於内臣有爲而營運於外内外合心君臣混一自然三花聚鼎五炁朝元異骨成親欣樂太平金剛經云凡所有相即是虚妄若見諸相非相即見如來豈不是天有五賊而見之者昌歟了眞子曰酒是良朋伴是花嶺頭時駕紫河車可憐金虎一聲嘯吹散青天五彩霞豈不是五賊在心施行于天者乎學人宜於此詳味頌曰五行之氣結成形罩却生前一點靈五賊若能歸主宰施天自有道光明宇宙在乎手萬化生乎身以道用言有道之人一心能制五賊遇五賊攻心我則把定三關天機不動外施金母之功簇三千六百正氣回七十二侯之要津行道一息能奪一年之節候是以昇陽施化出古超今皆在吾掌握之中矣古人所謂我命在我不在於天天地小我我大天地皇天不遠大藥非遥誠哉言也若得眞傳口訣運行符火于一身如取囊中物爾靜則爲金丹動則爲霹靂以世法言一君正位萬臣咸歸則天下山河人民賦貢莫不皆奉其主所有衣冠禮樂刑法制度莫不皆由君出道用與世法即同一體且如天下清平人民樂化雖有甲兵無所陳之用文而偃其武也忽遇寇賊生發便當建侯行師而討平之用武而後其文也魏伯陽故曰首尾武中間文老子曰吾何以知天下之然哉以此豈不是宇宙在乎手萬化生乎身哉頌曰有道之人固本源經天緯地量玄玄一拳握定陰陽領運化風威遍大千天性人也人心機也立天之道以定人也天賦命於人謂之性人心發用謂之機性即天也心即性也是以聖人觀天之道明天之性執天之行運心之機夫立天之道者一陰一陽也定人之道者一仁一義也以世法言天生於人唯人得其全體道必假人以行之天性妙理無非在於人心心所以能包含天理一動一靜分明發露天之機也聖人大觀天下以謂人人同體箇箇同眞于是制言行施教化立天道定人倫布告天下使人人知其有君臣父子夫婦長幼朋友三綱五常之理率性修道盡敬其身中庸云天命之謂性率性之謂道修道之謂教是也以道用言天性常主於靜人心常欲於動靜則養性動則復命復命曰常返常合道是立天之道以定人也老子曰故常無欲以觀其妙常有欲以觀其徼此兩者同出而異名同謂之玄玄之又玄衆妙之門孔子云一日克己復禮天下歸仁焉如斯之謂也頌曰天性人心理一同機關動靜道相通乾坤上下君臣合萬國民安樂歲豐天發殺機移星易宿地發殺機龍蛇起陸人發殺機天地反覆天人合發萬化定基形而上者謂之天形而下者謂之地鍾秀而生謂之人天地人三才而各有機天以斗爲機地以雷爲機人以心爲機也天發殺機移星易宿者此謂乾坤運化斗柄推遷晝夜不停其機諸星宿隨其旋轉此陰陽造化自然之理也夫周天三百六十五度四分度之一諸星宿皆有行其度次至如行此一度已滿必移過别宫度而行之餘度亦然是以滿而必至於反反而必復於初此氣數反常合道之理也地發殺機龍蛇起陸者此言地道厚載龍蛇蟄藏時因陰極而陽生於下陽漸長而壯雷動發聲從地而起龍蛇聞雷之聲乘陽而起此所以地發殺機龍蛇起於陸也人發殺機天地反覆者此謂覆即復也三才之中唯人最靈是以聖人觀天之道執天之行審地之理法地之用夫惟用是用返本還元以復之效天地之道以修其眞也天之星宿即我身之斗柄也地之龍蛇即我身之水火也凡作丹之用不過斡天罡而旋轉斗柄顛倒陰陽而既濟水火當鉛見癸生之時便以神呼氣歸鼎握固天罡以旋斗標此法天機移星易宿也流戊土而化火逼逐金精逆上泥丸此法地機龍蛇起陸也乾坤交姤之罷一氣流通直入黄庭而止産箇驪珠似月之圓發眞火煅煉結成金丹此人發殺機天地反覆也張紫陽所謂捉將坎位中心實點化離宫腹裏陰從此變成乾健體潜藏飛躍總由心丹經云人心若與天心合顛倒陰陽只片時老子曰致虚極守靜篤萬物並作吾以觀其復譚景昇化書所言得天地之綱知陰陽之房見精神之藏則數可以奪命可以活天地可以反復正謂此也天人合發萬化定基者天乃指性而言也人乃指命而言也總而言之作丹有時時至神知當此時採取則藥物應機施工一息之頃能定萬化之基只用半箇時辰而得還丹度人經乃曰璇璣玉衡一時停輪河海靜默山嶽藏雲天無浮翳四氣朗清土皆作碧玉無有異色豈非天人合發而萬化定基者乎頌曰旋斗歷箕回五常龍蛇起陸會乾陽半時反覆施刑德萬化都歸一粟藏性有巧拙可以伏藏九竅之邪在乎三要可以動靜人之一點眞靈謂之性百事通曉謂之巧諸般不能謂之拙所以巧者多智拙者多愚此二者過猶不及皆不得其中庸之道正孔子所謂智者過之愚者不及蓋爲人生於天地之間風土不同禀受自異故氣質有差耳是以性有巧有拙聖人故於此示人得其巧者不可逞於巧得其拙者不可縱於貪巧與拙可以伏藏於心自然復於本性而不妄矣苟有不藏於心巧者弄於巧拙者妄於貪如是之人未有不陷於害者也老子曰人多伎巧奇物滋起法令滋彰盗賊多有故聖人絶聖棄智絶巧棄利大巧若拙大辯若訥豈不是伏藏者也九竅之邪在乎三要可以動靜者此言九竅人之首有九宫乃曰九竅本來天性於泥丸所居故曰性門又曰髓海髓海滿而精神全暢髓海消而精神耗竭首之九宫其名不一今略言之泥丸之宫爲百關總會之穴乃萬神朝集之宫諸星森羅日月運轉無非於此處撥動機關而旋斗柄此人法天地合象如此凡人性於日用之間下連於心心有七孔二毛亦曰九竅以應上天北斗七星左轉右弼此乃有象之心若言天心在人身天地正中混洞空玄實無形象聖父聖母所付一點眞陽之氣居此天心是爲元始祖劫性君寄體于此陽得九數故乾元用九是爲九竅合之爲一散之則九所以人心一念動處北辰即知是故聖人於此經中垂戒學人平日二六時中可以虚心靜性保氣惜精凡遇邪攻九竅便當運三要以復之夫惟三要有内三要有外三要内之三要者精氣神也外三要者眼耳口也眼爲神之門耳爲精之門口爲氣之門視之不息則神從眼漏聽之不息則精從耳漏言之不息則氣從口漏逐於外而失於内心爲形役是九竅之邪在乎三要者也若能收其視返其聽緘其言當施工發越之際牢閉三關飛意存神於兩腎中根鍊精化氣上補泥丸以腦腦補完而金液生鍊炁下化於神神復全而眞火旺發神火以錬虚虚室受陽而生白結成靈胎神明開慧此錬還丹眞工夫也須用口傳心授大要識時通變當靜以養性當動以修命性命雙修吾道長存豈非可以動靜者耶魏伯陽曰眼耳口三寶固塞勿發通眞人潛深淵浮游守規中即經中所謂三返盡夜用師萬倍是也頌曰巧拙都忘遠客塵回光返聽内全神三般大藥燒成寶占斷陽臺一段春火生於木禍發必剋姦生於國其動必潰知之修鍊是謂聖人火之爲言忿也姦之爲言慾也所謂火生於木禍發必剋者以俗人言之凡因事觸心即生忿火性上炎神怒氣發與人鬥争却不知離中之神被無明火盡焚之矣姦生於國其動必潰者此言國猶身也身隨幻變眼因色媚神領在心情慾交蔽陽即下奔動之必潰却不知坎内眞精被姦盡潰之矣如是之人直至死而後已豈知修鍊者哉是以聖人明天地陰陽符候之理反求於身行之木旺則火生金旺則水生卯酉二八之月宜當沐浴凡遇火生於木則當存性而懲忿也故禍發而必剋當姦生於國我則閉門而窒慾也流意回坤故動之而必潰尹眞人故曰惟其來干者皆攝之以一息則變物爲我易卦云復其見天地之心乎所以知之修鍊是謂聖人也矣頌曰野戰防危要識時龍争虎鬥兩奔馳片時風掃浮雲盡露出蟾光一片輝黄帝陰符經夾頌解注卷上
