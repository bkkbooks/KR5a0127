body:
  text: 黃帝陰符經注解序餘十天法人人法天陰符之所以作也昔黃帝慕道懇切故往崆洞山拜廣成子而問至道授以返還長生之訣後於峨嵋山又拜皇人授以五芽三一之文祕而修之而登上仙憂道後世恐失其真遂述陰符經三篇分為上中下以按三才而明精氣神各有極趣之妙又恐人不知返還之理故首言以觀天之道執天之行盡矣此所以為陰符經三篇之綱目知天道必知人道知人道必知丹道知丹道必知其陰陽動靜之機知其機必知其內外返還之理知其理採鉛汞不失其時運符火不失其候經中所謂絶利一源用師十倍三返晝夜用師萬倍此又示人以修真之要在乎收拾身心一定不移之志次則用抽添工夫而不可間斷全真之道别無他也一要精全二要氣全三要神全收視則神真返聽則精真緘言則氣真了此三全三真自然混融於中真火煅煉結成金胎十月工足陰盡陽純當此時脫胎神化變現無方超出生死之外永為金剛不壞之身此所以為還丹者也余謂是經文簡而意奧或有不明其説者看於傍求而外其道于是乎不愧僣狂之罪將先師所授祕訣遂逐段釋其文意而又述頌總證剖露玄機以俟後之同志非敢為是可以為初學者一助云爾混然子王道淵序
