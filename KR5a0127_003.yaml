body:
  text: 南昌修江混然子王道淵注瞽者善聽聾者善視絶利一源用師十倍三返晝夜用師萬倍瞽者無目之稱聾者不聽之謂以世法言人雖兩目皆瞽耳却善能於聽兩耳雖聾眼却善能於視此謂世人貪心不止隨竅所漏逐於外而失於內此乃凡夫之人貪著其事故設此喻以為學者之戒今以道用言大修行人聖智圓通神機無礙眼亦能聽耳亦能視吁夫視聽之妙非在眼耳而實在神機之視聽也絶利一源用師十倍者此言以誠性為體絶去利欲清心一源自得其虛靈不昧終不及行武鍊之工夫故云用師十倍之力也乃形容修性之工夫縱得寂然不動猶屬陰神豈若修命三返晝夜而有回陽换骨之妙乎其三返有二說外三返乃眼耳口內三返乃精氣神也二六時中外則回眼光凝耳韻緘口氣晝夜返顧於中不可須臾間隔內則混成三寶不可蹉過天機當鉛見癸生之時便當懸黍珠於空玄之中握固不動飛神沉下海底鍊精化氣迫逐度上南宫補離作乾繼此已往鍊氣化神直下黃庭而止巽門雙開大火煅鍊片餉之間鍊神還虛虛空朗朗復其性初此乃性命雙修之道度人經云中理五氣混合百神十轉回靈萬氣齊仙丹經云不刻時中分子午無爻卦內定乾坤是以行道一次則諸天遙唱萬帝設禮修丹之力其功莫大三返晝夜得非用師萬倍者乎頌曰瞽聽聾視妙心通絶利清源十倍功大藥三般返晝夜神施萬化道無窮心生於物死於物機在目以世法言衆人之心被形所役終日業識紛紜一心未嘗離物心生於物即死於物矣其機在於兩目凡物現前目必先見見愛動心意識外逐日積月增作下死根莫非皆從眼界之漏也老子曰人之生動之死地民之輕死以其求生之厚心難制伏者因機在目也以道用言大修行人端心清靜唯道為身凡遇心生於物之時舉六通力放大金光照無極世界運北斗南辰以復之是得物死而我道興隆其機實在於天目流意提吸回旋之妙也此須口傳未敢顯露川老注金剛經云金剛腳踏地幡竿頭指天要知端的處北斗面南看是也頌曰心生於物死於物機應分明在目中十轉回靈歸竅妙神凝氣住道興隆天之無恩而大恩生迅雷烈風莫不蠢然天之無恩而大恩生者此言天以生物為心四時運化是自然之理豈有意施恩哉蓋因萬物之生妖正並作妖反害於正是不得已大恩生焉故用雷霆以申其令揚烈風而播其威使萬物畏伏皈正其有妖物不改過者雷霆滅其形風刀碎其體去一害而安衆天威昭鑒豈容其私此天無恩而大恩所以生大恩生而迅雷烈風莫不蠢然神妙鼓舞而作頃刻遍滿虛空變化不可測也聖人亦體天道而行以安天下下之民民淳樂化無恩可施其或有悖逆為民害者不得已建侯行師陳甲兵以伐之去一暴而安善良亦如迅雷烈風振其威嚴示之强梗順於正命此聖人無恩而大恩所以生焉此皆以世法釋若以道用言修丹之功亦同此理當其心空性靜之時形忘物忘亦無恩可施因其有陰陽二氣動靜不常而有分合之兆時遇陰魔侵犯我則正位中原飛神攝召陽雷電母擲火奮迅回烈風掃蕩中山之陰一息冥情莫不蠢然暢然而若醉此大恩生而施造化之功結成還丹之妙也如此頌曰天本無恩恩大生冲虛二氣怒流行雷轟風烈蠢然作造化由來不順情至樂性餘至靜性廉天之至私用之至公禽之制在氣至樂者神全也至靜者精全也此所謂神全不生忿性樂有餘裕矣精全不思欲性靜有廉潔矣老君授于吉太平之要曰夫人天付之神地付之精中和付之氣人能寶精去欲固氣愛神內則身得長生外則國致太平况有諸內必形於外了性則身清靜了命則丹圓成性命雙全自然至樂性餘至靜性廉也天之至私用之至公者此言天與萬物唯天得其造化之大以其不自生是以能長且久故能成其私此天所以得之至私也及其發用大運流行無物不被其澤此天所以用之至公也聖人體天道而修真比之衆人而亦得之至私及其用於事也無一夫不被其德豈不至公乎禽之制在氣者此設喻之辭禽即心也神也火也南方朱雀也此警示學人大要專心制氣以氣為藥物以神為符火採取依時烹鍊合法自然陰氣化為陽氣識神化為真人混融一片骨换身輕如禽鳥翱翔太空皆得制氣之理故仙人號曰羽客施肩吾曰氣是添年藥心為使氣神能知行氣主便是得仙人此之謂也頌曰氣固神和樂有餘虛心清儉養真軀丹成自與天長久身若禽飛上太虛生者死之根死者生之根恩生於害害生於恩生死恩害此四者陰陽反復被此對待之理有生即死有死即生有恩即害有害即恩此氣數之然也以衆人言貪生之厚心被物迷即造下死之根矣若能死心守分絶利清源即得生之根矣古人所謂貪他的著他的失便宜得便宜是以聖人於此覺照分明凡心生於物心即死之心既能死道即生之尹喜真人故曰聞道於朝死心於夕金剛經云不應住色生心不應住聲香味觸法生心應無所住而生其心老子曰生之徒十有三死之徒十有三夫何故我得彼失乃得生彼得我失乃入死學者可不慎歟恩生於害害生於恩者此言恩中有害害中有恩正道德經所謂禍兮福所倚福兮禍所伏文始經亦曰天下之理恩或化為讎讎或化為恩此理屬於事而言不聞談景升化書云乎侯者人所貴金者人所重衆人封公而得侯者不美衆人分玉而得金者不樂是賞不可妄行恩不可妄施由為爭奪之漸即為死亡之基此皆世法釋若以道用言道由魔顯魔因道化當性天雲起之時我則登引群真轉輪而復禮豈不是恩生於害乎苦海波翻之際我則升玄同化而歸尊豈不是害生於恩乎頌曰心生有欲死之根心死無為道自存恩若妄施招禍害害窮仍復見於恩愚人以天地文理聖我以時物文理哲愚人以天地文理聖者此言愚人非是言愚蠢之愚蓋為有等學人因聰明所障被文理所拘竟不肯低下參訪至人窮究自身天地造化之理只於外面尋紙上之文億度天地文理快說快道他遂以此為聖吁何其愚之甚也以有道者觀之反為愚人也我以時物文理哲者此謂有道之人能大觀天地以四時之文萬物之理總歸我身明徹為哲如犧皇仰觀俯察旁觀鳥獸之文近取諸身遠取諸物始畫八卦造書契又如黃帝之廣參孔聖之多學豈非由哲而至聖乎近有注本多於此止余按褚遂良得太極丹真人所注本及與張果老人注本其下皆有二十一句百一十六字極說得妙今當以太極丹真人張果本為正諸本逸去皆後人傳注之誤爾即非結經之義頌曰愚人外面論虛空執理拘文性不通豈識我家真妙用朝朝日出嶺頭紅人以愚虞聖我以不愚虞聖人以奇期聖我以不奇期聖故曰沉水入火自取滅亡人以愚虞聖者此謂有等參襌學道之人起頭不遇真師所授他平日只以頑空為性諸經不去參究惟守一塊肉心灰心槁木死捉箇念頭不放出去不貪不求他以此為聖殊不知癡猫守於空穴而終不得於鼠也又如鑽冰求火而終不得於火也我以不愚虞聖者此言大修行人必須參拜明師開發竅妙廣通諸經究竟玄奧何云是性何云是命性如何修命如何鍊參去參來直至到那參不得處方是不愚到此之時只用一箇損字來受用諸緣損盡以至無為自然智慧生明道冲靈應我故以不愚虞聖也豈不聞大舜之聖每好問而好察邇言大禹聞一善言則拜顔子得一善則拳拳服膺而弗失以三聖之道莫非好學而得以今人之資不學可乎度人經云乃當洞明至言是也人以奇期聖者此言有等學人不求正法唯務異端傍門小法奇怪之術以惑後人如巫炎等尚泥水丹法擇美女為爐鼎以三峰為採戰金鎗不倒為固濟提吸女精作黃河逆流為丹頭以多入少出為行火如此謬術大亂正宗又有等以手為雌雄劍取女癸為丹頭又有等休妻絶粒漱津運氣摩擦搐縮吸日月精華燒茅弄火如斯等類何啻千門他以此奇而期聖也丹經故曰道法三千六百門人人各執一為根豈知眥子玄微處不在三千六百門金剛經亦曰一切有為法如夢幻泡影如露亦如電應作如是觀是也我以不奇期聖者此言得道之士常以無事取天下內則存真養素外則隨事應機國土清平無為而樂魔兵忽生攝情一息自然而然無理至理此所以不奇而期聖也故曰沉水入火自取滅亡者此當有二說以弄奇術者言自迷正宗喪失真道耗其靈根如是之人將身蹈其湯火日取滅亡也若以有道者言當作丹之時則行戊己之門以戊土下沉於水府捉坎陽去補離陰成乾之後以己土退符流珠復還神室火鍊混融塵垢盡淨覺身忘如一太虛洞妙無際此所以沉水入火自取滅亡尹真人述說經臺詩云心昧玄言沉地府性通妙語合天心是也頌曰愚人六會弄頑空用術為奇性自蒙我以無為清靜道黃金錬出滿爐紅自然之道靜故天地萬物生天地之道浸故陰陽勝陰陽相推而變化順矣自然之道靜者此謂天道流行四時宣氣本自然而靜所以天地萬物生聖人體天道而行亦自然而靜以無事定天下所以四海萬民樂無名之朴老子故云行不言之教我無為而民自化我好靜而民自正是也天地之道浸故陰陽勝者此言天氣不下降地氣不上升上下不通故天地否遂成孤陰寡陽二氣偏陷五星失度日月相刑四時不調寒暑失節冬天震雷夏月飛雪赤旱洪漂萬物耗竭此天地之道浸故陰陽勝也彭真人曰陽火過刻水旱不調凝冬變為大暑也陰符失節寒暖相侵盛夏反為濃霜也金宫既砂汞之不萌一鼎則蟲螟之互起大則山崩地圮金虎與木龍沸騰小則雨暴風飄坎男共離女奔逸此之謂也陰陽相推而變化順者此言陰陽有離合之妙水火有既濟之方採藥依時運符合刻自然陰陽相推而變化順是得形神俱妙與道合真也頌曰自然道靜物生全陰錯陽差便屬偏會得陰陽顛倒用回童返老壽齊天是故聖人知自然之道不可違因而制之至靜之道律歷所不能契爰有奇器是生萬象八卦甲子神機鬼藏陰陽相勝之術昭昭乎進乎象矣是故者乃轉語之辭於此故總結陰符經三篇內㫖之意聖人者有道德之尊稱也知自然之道不可違者此言我既知大道是自然之理則當守我自然之道不可違而豈别求於他也因而制之者此謂我身之神氣如龍虎之難調習必須因時運轉逆回土釜而制伏之學人能領悟此意可以鍊還丹矣至靜之道律歷所不能契者此言工夫鍊化之後自然真空朗徹如萬里無雲之狀當此時形忘物忘性靜杳無名象難描難寫豈律歷所能契邪爰有奇器者此謂三寶混合養成靈丹貫石透金變化自在是為無名之器豈非奇器者乎大修行人有此奇器運用大化如指掌是生萬象八卦甲子矣神機鬼藏陰陽相勝之術昭昭乎進乎象者此言神機剛烈鬼自伏藏陰盡陽純脫胎神化自此移神上居泥丸之宫正要腳踏實地子細保養迸破天門陽神欲出勿可輕縱直待存惜如孩童力健能走然後可以出神故曰陰陽有相勝之術內功已就外行圓成自然感帝君飛詔來徵則身乘雲軿鶴駕霞光繚繞天香馥郁上升玉京金闕隨其功行而與仙宫豈不是昭昭乎進乎象矣如軒轅黃帝於巴山與後宫及羣臣七十二人乘龍而飛升又如舜帝於蒼梧何侯之家五老捧詔而飛升又如漢之天師張道陵晋之許旌陽葛仙翁皆同妻子白日飛升為金闕之臣神仙之學誠有驗也古今得道者奚止萬千之數焉學者不可以神仙為荒唐而生退心大要信得及更求明師口授勤行修錬無二爾心自有天仙保舉必登仙翁之品不虛言也頌曰胎仙養就脫陰符朝拜高尊入玉虛進象昭昭神變化鸞翔鳳翥駕雲車黃帝陰符經夾頌解注卷下
